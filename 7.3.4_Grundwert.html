<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grundwert Trainer – Dreisatz-Tabelle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#fff8f0;color:#1a1a2e;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;padding:32px 16px 60px}

  .header{text-align:center;margin-bottom:24px}
  .header .chip{font-size:11px;letter-spacing:4px;color:#e85d04;text-transform:uppercase;display:block;margin-bottom:8px}
  .header h1{font-size:28px;font-weight:900;color:#1a1a2e;border-bottom:4px solid #e85d04;padding-bottom:6px;display:inline-block}
  .header p{color:#6b7280;font-size:13px;margin-top:8px}

  .progress{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
  .pb{width:36px;height:36px;border-radius:8px;border:2px solid #e5e7eb;background:#fff;color:#9ca3af;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
  .pb.active{border-color:#e85d04;background:#e85d04;color:#fff}
  .pb.done{border-color:#059669;background:#d1fae5;color:#059669}

  .bar-wrap{width:100%;max-width:640px;background:#e5e7eb;border-radius:999px;height:6px;margin-bottom:24px}
  .bar{height:100%;background:#e85d04;border-radius:999px;transition:width .4s ease}

  .card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:28px 28px 32px;max-width:640px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}

  .task-box{background:#fef3c7;border:1px solid rgba(217,119,6,.2);border-radius:12px;padding:16px 20px;margin-bottom:22px;font-size:16px;line-height:1.8}
  .task-lbl{font-size:10px;letter-spacing:3px;color:#d97706;text-transform:uppercase;display:block;margin-bottom:6px;font-weight:800}

  .phase-hint{font-size:13px;color:#6b7280;margin-bottom:16px;line-height:1.6;padding:10px 14px;background:#f9fafb;border-radius:8px;border-left:3px solid #e85d04}

  .sec-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:16px;font-weight:800}
  .badges{display:flex;gap:8px;flex-wrap:wrap}
  .badge{padding:7px 16px;border-radius:10px;border:2px solid #e5e7eb;background:#fff;color:#9ca3af;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
  .badge:hover{border-color:#9ca3af;color:#374151}
  .badge.sb{border-color:#7c3aed;background:#ede9fe;color:#7c3aed}
  .badge.sa{border-color:#e85d04;background:#fff0e8;color:#e85d04}

  .btn-main{width:100%;padding:13px;border-radius:12px;border:none;background:#e85d04;color:#fff;font-weight:900;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:18px;box-shadow:0 4px 14px rgba(232,93,4,.3)}
  .btn-main:hover{background:#d14f00}

  .alert{border-radius:10px;padding:11px 15px;font-size:13px;margin-top:12px;line-height:1.5}
  .alert.red{background:#fee2e2;border:1px solid rgba(220,38,38,.2);color:#dc2626}
  .alert.green{background:#d1fae5;border:1px solid rgba(5,150,105,.2);color:#059669;margin-bottom:16px}

  /* ── Dreisatz-Tabelle ── */
  .table-wrap{margin-bottom:22px}
  .table-title{font-size:11px;letter-spacing:2px;color:#7c3aed;text-transform:uppercase;margin-bottom:10px;font-weight:800}

  .dreisatz{border-collapse:collapse;width:auto;min-width:280px}
  .dreisatz th{background:#f9fafb;color:#6b7280;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border:1px solid #e5e7eb;font-weight:800;text-align:center}
  .dreisatz td{border:1px solid #e5e7eb;padding:0;text-align:center;vertical-align:middle}
  .dreisatz tr.row-given td{background:#f9fafb}
  .dreisatz tr.row-calc td{background:#faf5ff}
  .dreisatz tr.row-result td{background:#f9fafb}

  .cell-fixed{padding:10px 18px;color:#6b7280;font-weight:700;font-size:16px;min-width:90px}
  .cell-fixed.highlight{color:#e85d04}

  .cell-input{padding:4px 6px;min-width:90px}
  .cell-input input{width:100%;padding:7px 10px;border-radius:8px;border:2px solid #e5e7eb;background:#fff;color:#1a1a2e;font-size:16px;font-weight:700;font-family:'Nunito',sans-serif;outline:none;text-align:center;transition:border-color .2s}
  .cell-input input:focus{border-color:#e85d04}
  .cell-input input.ok{border-color:#059669;background:#d1fae5;color:#059669}
  .cell-input input.err{border-color:#dc2626;background:#fee2e2;color:#dc2626}
  .cell-input input.neutral{border-color:#e5e7eb}

  .arrow-row td{border:none;background:transparent;padding:2px 0;font-size:12px;color:#9ca3af;text-align:center;font-weight:700}

  .btn-check{padding:11px 24px;border-radius:10px;border:none;background:#e85d04;color:#fff;font-weight:900;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:16px;box-shadow:0 4px 12px rgba(232,93,4,.25)}
  .btn-check:hover{background:#d14f00}

  .res-box{border-radius:12px;padding:18px 20px;margin-top:14px}
  .res-box.ok{background:#d1fae5;border:1px solid rgba(5,150,105,.2)}
  .res-box .t{color:#059669;font-weight:900;font-size:17px;margin-bottom:4px}
  .res-box .c{color:#6b7280;font-size:13px;line-height:1.7}
  .res-box .c strong{color:#1a1a2e}
  .btn-next{margin-top:12px;background:#059669;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px}
  .all-done{margin-top:8px;color:#e85d04;font-weight:900;font-size:17px}

  .antwort{margin-top:10px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 16px;font-size:14px;color:#6b7280}
  .antwort strong{color:#1a1a2e}

  .btn-hint{background:transparent;border:1px solid #9ca3af;color:#9ca3af;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;margin-top:10px;display:block}
  .sol-box{background:#fef3c7;border:1px solid rgba(217,119,6,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#1a1a2e;margin-top:8px;line-height:1.8}

  .footer{margin-top:20px;color:#d1d5db;font-size:12px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <span class="chip">Prozentrechnung · Klasse 7</span>
  <h1>Grundwert berechnen</h1>
  <p>Fülle die Dreisatz-Tabelle aus – Schritt für Schritt</p>
</div>

<div class="progress" id="prog"></div>
<div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
<div class="card" id="card"></div>
<p class="footer" id="foot"></p>

<script>
// Dreisatz Grundwert:
// Spalten: % | Einheit
// Zeile 1: p%  | W    ← vorausgefüllt (p und W gegeben)
// Zeile 2: 1%  | W/p  ← Schüler füllt aus (÷p-Schritt)
// Zeile 3: 100%| G    ← Schüler füllt aus (·100-Schritt) → G ist gesucht

const AUF = [
  { text:"50% von einer unbekannten Menge sind 36 kg. Wie schwer ist das Ganze?",
    p:50, W:36, G:72, col1:"%", col2:"Menge (kg)", einheit:"kg" },
  { text:"40% einer Strecke sind 80 m. Wie lang ist die gesamte Strecke?",
    p:40, W:80, G:200, col1:"%", col2:"Strecke (m)", einheit:"m" },
  { text:"3% von einem Geldbetrag sind 12 €. Wie groß ist der gesamte Betrag?",
    p:3, W:12, G:400, col1:"%", col2:"Betrag (€)", einheit:"€" },
  { text:"Beim Kauf eines Schrankes werden 15% Rabatt gewährt. Das sind 135 €. Wie teuer war der Schrank vorher?",
    p:15, W:135, G:900, col1:"%", col2:"Preis (€)", einheit:"€" },
  { text:"In einer Schulklasse sind 12 Schülerinnen. Das entspricht 60% der Klasse. Wie viele Schülerinnen und Schüler sind in der Klasse?",
    p:60, W:12, G:20, col1:"%", col2:"Anzahl Schüler", einheit:"Schüler" },
  { text:"Bei einer Verlosung gibt es 75 Gewinnlose. Das sind 25% aller Lose. Wie viele Lose gibt es insgesamt?",
    p:25, W:75, G:300, col1:"%", col2:"Anzahl Lose", einheit:"Lose" },
  { text:"Tina fährt seit 3 Stunden Zug und hat 60% ihrer Fahrzeit hinter sich. Wie lange fährt sie insgesamt?",
    p:60, W:3, G:5, col1:"%", col2:"Zeit (h)", einheit:"Stunden" },
  { text:"Nach 18 km wurde die erste Rast gemacht. Das waren 40% des gesamten Weges. Wie lang war die Tour?",
    p:40, W:18, G:45, col1:"%", col2:"Strecke (km)", einheit:"km" },
  { text:"Ein Pullover kostet jetzt 69,30 €. Das sind 70% des alten Preises. Wie viel hat er vorher gekostet?",
    p:70, W:69.3, G:99, col1:"%", col2:"Preis (€)", einheit:"€" },
  { text:"In einem Tierheim sind 28 Hunde. Das sind 35% aller Tiere. Wie viele Tiere leben insgesamt im Tierheim?",
    p:35, W:28, G:80, col1:"%", col2:"Anzahl Tiere", einheit:"Tiere" }
];

let idx=0, phase='id', gesucht=null, gegeben=[], gelöst=new Set(), zeigeSol=false;
function getA(){ return AUF[idx]; }

function render(){
  const prog=document.getElementById('prog');
  prog.innerHTML='';
  AUF.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='pb'+(i===idx?' active':gelöst.has(i)?' done':'');
    b.textContent=gelöst.has(i)?'✓':i+1;
    b.onclick=()=>reset(i);
    prog.appendChild(b);
  });
  document.getElementById('bar').style.width=(gelöst.size/AUF.length*100)+'%';
  document.getElementById('foot').textContent=`Aufgabe ${idx+1} von ${AUF.length} · ${gelöst.size} gelöst`;

  const a=getA();
  const card=document.getElementById('card');
  card.innerHTML='';

  const tb=el('div','task-box');
  tb.innerHTML=`<span class="task-lbl">Aufgabe ${idx+1}</span>${a.text}`;
  card.appendChild(tb);

  if(phase==='id') renderIdentify(card,a);
  else renderTable(card,a);
}

function renderIdentify(card,a){
  const hint=el('div','phase-hint');
  hint.innerHTML='💡 <strong>Schritt 1:</strong> Bestimme zuerst – was ist <em>gegeben</em>, was ist <em>gesucht</em>?';
  card.appendChild(hint);

  const lblG=el('div','sec-lbl'); lblG.style.color='#7c3aed'; lblG.textContent='Gegeben ist: (mehrere wählen)';
  card.appendChild(lblG);
  const bgv=el('div','badges');
  ['G – Grundwert','p – Prozentsatz','W – Prozentwert'].forEach((l,i)=>{
    const k=['G','p','W'][i];
    const b=el('button','badge'+(gegeben.includes(k)?' sb':''));
    b.textContent=l;
    b.onclick=()=>{ gegeben.includes(k)?gegeben=gegeben.filter(x=>x!==k):gegeben.push(k); render(); };
    bgv.appendChild(b);
  });
  card.appendChild(bgv);

  const lblQ=el('div','sec-lbl'); lblQ.style.color='#e85d04'; lblQ.textContent='Gesucht ist:';
  card.appendChild(lblQ);
  const bgq=el('div','badges');
  ['G – Grundwert','p – Prozentsatz','W – Prozentwert'].forEach((l,i)=>{
    const k=['G','p','W'][i];
    const b=el('button','badge'+(gesucht===k?' sa':''));
    b.textContent=l;
    b.onclick=()=>{ gesucht=k; render(); };
    bgq.appendChild(b);
  });
  card.appendChild(bgq);

  const errDiv=el('div'); errDiv.id='id-err';
  card.appendChild(errDiv);

  const btn=el('button','btn-main');
  btn.textContent='Weiter zur Tabelle →';
  btn.onclick=checkId;
  card.appendChild(btn);
}

function renderTable(card,a){
  const okMsg=el('div','alert green');
  okMsg.innerHTML='✓ Richtig! Gegeben: <strong>p und W</strong> · Gesucht: <strong>G (Grundwert = 100%)</strong>';
  card.appendChild(okMsg);

  const wrap=el('div','table-wrap');
  const title=el('div','table-title');
  title.textContent='Fülle den Dreisatz aus:';
  wrap.appendChild(title);

  const table=document.createElement('table');
  table.className='dreisatz';

  // Header
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  [a.col1, a.col2].forEach(h=>{
    const th=document.createElement('th'); th.textContent=h; hr.appendChild(th);
  });
  thead.appendChild(hr); table.appendChild(thead);

  const tbody=document.createElement('tbody');

  // Zeile 1: p% | W  (beide vorausgefüllt – gegeben)
  const r1=document.createElement('tr'); r1.className='row-given';
  const r1c1=document.createElement('td');
  r1c1.innerHTML=`<div class="cell-fixed highlight">${a.p} %</div>`;
  const r1c2=document.createElement('td');
  r1c2.innerHTML=`<div class="cell-fixed highlight">${a.W}</div>`;
  r1.appendChild(r1c1); r1.appendChild(r1c2);
  tbody.appendChild(r1);

  // Pfeil ÷p
  addArrow(tbody, `÷ ${a.p}`, `÷ ${a.p}`);

  // Zeile 2: 1% | W/p  (Schüler füllt aus)
  const step=Math.round((a.W/a.p)*100000)/100000;
  const r2=document.createElement('tr'); r2.className='row-calc';
  const r2c1=document.createElement('td'); r2c1.className='cell-input';
  r2c1.innerHTML=`<input type="text" id="i_a1" placeholder="?" autocomplete="off">`;
  const r2c2=document.createElement('td'); r2c2.className='cell-input';
  r2c2.innerHTML=`<input type="text" id="i_b1" placeholder="?" autocomplete="off">`;
  r2.appendChild(r2c1); r2.appendChild(r2c2);
  tbody.appendChild(r2);

  // Pfeil ·100
  addArrow(tbody, '· 100', '· 100');

  // Zeile 3: 100% | G  (Zielzeile – Grundwert gesucht)
  const r3=document.createElement('tr'); r3.className='row-result';
  const r3c1=document.createElement('td'); r3c1.className='cell-input';
  r3c1.innerHTML=`<input type="text" id="i_a2" placeholder="?" autocomplete="off">`;
  const r3c2=document.createElement('td'); r3c2.className='cell-input';
  r3c2.innerHTML=`<input type="text" id="i_b2" placeholder="?" autocomplete="off" style="border-color:#e85d0444">`;
  r3.appendChild(r3c1); r3.appendChild(r3c2);
  tbody.appendChild(r3);

  table.appendChild(tbody);
  wrap.appendChild(table);

  const hint2=el('div');
  hint2.style.cssText='font-size:12px;color:#9ca3af;margin-top:8px';
  hint2.innerHTML=`Tipp: Zeile 2 = 1% · Zeile 3 = 100% (das ist der Grundwert, den du suchst)`;
  wrap.appendChild(hint2);
  card.appendChild(wrap);

  ['i_a1','i_b1','i_a2','i_b2'].forEach(id=>{
    setTimeout(()=>{
      const inp=document.getElementById(id);
      if(inp) inp.onkeydown=e=>{ if(e.key==='Enter') checkTable(); };
    },0);
  });

  const errDiv=el('div'); errDiv.id='tbl-err';
  card.appendChild(errDiv);

  const btn=el('button','btn-check');
  btn.textContent='Tabelle prüfen ✓';
  btn.onclick=checkTable;
  card.appendChild(btn);

  const resDiv=el('div'); resDiv.id='res';
  card.appendChild(resDiv);
}

function addArrow(tbody,leftTxt,rightTxt){
  const ar=document.createElement('tr'); ar.className='arrow-row';
  const td=document.createElement('td'); td.colSpan=2;
  td.innerHTML=`<div style="display:flex;justify-content:space-around;padding:2px 18px">
    <span>↓ ${leftTxt}</span><span>↓ ${rightTxt}</span></div>`;
  ar.appendChild(td);
  tbody.appendChild(ar);
}

function checkId(){
  const ok=gesucht==='G'&&gegeben.includes('p')&&gegeben.includes('W')&&gegeben.length===2;
  if(ok){ phase='calc'; zeigeSol=false; render(); }
  else{
    document.getElementById('id-err').innerHTML=
      `<div class="alert red">Nicht ganz richtig. Hinweis: Gegeben sind <strong>p</strong> (Prozentsatz) und <strong>W</strong> (Prozentwert) – gesucht ist <strong>G</strong> (der Grundwert = 100%).</div>`;
  }
}

function checkTable(){
  const a=getA();
  const step=Math.round((a.W/a.p)*100000)/100000; // W/p = Wert für 1%

  const fA1=document.getElementById('i_a1'); // Zeile2 Spalte% → erwarte: 1
  const fB1=document.getElementById('i_b1'); // Zeile2 Spalte Wert → erwarte: step (W/p)
  const fA2=document.getElementById('i_a2'); // Zeile3 Spalte% → erwarte: 100
  const fB2=document.getElementById('i_b2'); // Zeile3 Spalte Wert → erwarte: G

  if(!fA1||!fB1||!fA2||!fB2) return;

  const vA1=parseFloat((fA1.value||'').replace(',','.'));
  const vB1=parseFloat((fB1.value||'').replace(',','.'));
  const vA2=parseFloat((fA2.value||'').replace(',','.'));
  const vB2=parseFloat((fB2.value||'').replace(',','.'));

  const tol=(val)=>Math.max(Math.abs(val)*0.01,0.05);

  const okA1=vA1===1;
  const okB1=!isNaN(vB1)&&Math.abs(vB1-step)<=tol(step);
  const okA2=vA2===100;
  const okB2=!isNaN(vB2)&&Math.abs(vB2-a.G)<=tol(a.G);

  setColor(fA1,okA1); setColor(fB1,okB1);
  setColor(fA2,okA2); setColor(fB2,okB2);

  const resDiv=document.getElementById('res');
  if(!resDiv) return;

  if(okA1&&okB1&&okA2&&okB2){
    gelöst.add(idx);
    updateProgress();
    const stepDisp=Number.isInteger(step)?step:step.toString().replace('.',',');
    resDiv.innerHTML=`
      <div class="res-box ok">
        <div class="t">✓ Perfekt! Tabelle vollständig richtig!</div>
        <div class="c">
          ${a.p}% → ${a.W} &nbsp;÷${a.p}→&nbsp; 1% → <strong>${stepDisp}</strong> &nbsp;·100→&nbsp; 100% → <strong>${a.G} ${a.einheit}</strong>
        </div>
        <div class="antwort">Antwortsatz: <strong>Wenn ${a.p}% gleich ${a.W} ${a.einheit} sind, beträgt der Grundwert ${a.G} ${a.einheit}.</strong></div>
        ${idx<AUF.length-1
          ?`<button class="btn-next" onclick="reset(${idx+1})">Nächste Aufgabe →</button>`
          :`<div class="all-done">🎉 Alle 10 Aufgaben geschafft!</div>`}
      </div>`;
  } else {
    const stepDisp=Number.isInteger(step)?step:step.toString().replace('.',',');
    let msgs=[];
    if(!okA1) msgs.push(`Zeile 2, Spalte %: Hier steht <strong>1</strong> (ein Prozent).`);
    if(!okB1) msgs.push(`Zeile 2, Spalte Wert: Hier steht <strong>${stepDisp}</strong> (= ${a.W} ÷ ${a.p}).`);
    if(!okA2) msgs.push(`Zeile 3, Spalte %: Hier steht <strong>100</strong> (der Grundwert entspricht 100%).`);
    if(!okB2) msgs.push(`Zeile 3, Spalte Wert: Hier steht <strong>${a.G}</strong> (= ${stepDisp} · 100).`);

    let html=`<div class="alert red" style="margin-top:12px">
      ${msgs.map(m=>`<div style="margin-bottom:4px">🔸 ${m}</div>`).join('')}
    </div>`;
    if(!zeigeSol){
      html+=`<button class="btn-hint" onclick="showSol()">Lösungsweg einblenden</button>`;
    } else {
      html+=`<div class="sol-box">
        ${a.p}% → ${a.W} ${a.einheit}<br>
        ÷ ${a.p}: 1% → <strong>${stepDisp} ${a.einheit}</strong><br>
        · 100: 100% → <strong>${a.G} ${a.einheit}</strong>
      </div>`;
    }
    resDiv.innerHTML=html;
  }
}

function showSol(){ zeigeSol=true; checkTable(); }

function updateProgress(){
  document.querySelectorAll('.pb').forEach((b,i)=>{
    b.className='pb'+(i===idx?' active':gelöst.has(i)?' done':'');
    b.textContent=gelöst.has(i)?'✓':i+1;
  });
  document.getElementById('bar').style.width=(gelöst.size/AUF.length*100)+'%';
  document.getElementById('foot').textContent=`Aufgabe ${idx+1} von ${AUF.length} · ${gelöst.size} gelöst`;
}

function setColor(inp,isOk){
  if(!inp) return;
  inp.className=inp.value===''?'neutral':(isOk?'ok':'err');
}

function reset(i){ idx=i; phase='id'; gesucht=null; gegeben=[]; zeigeSol=false; render(); }
function el(tag,cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }

render();
</script>
</body>
</html>
